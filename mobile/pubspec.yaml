name: lumber_now
description: LumberNow - AI-powered material ordering for contractors.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.1.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  intl: ^0.19.0
  json_annotation: ^4.8.1

  # New dependencies
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  audio_waveforms: ^1.0.5
  cached_network_image: ^3.3.1
  flutter_slidable: ^3.0.1
  infinite_scroll_pagination: ^4.0.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
