version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "numeric"
            go_type: "string"
          - db_type: "pg_catalog.numeric"
            go_type: "string"
